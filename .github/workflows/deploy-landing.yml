name: Trigger Landing Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate legal documents
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Validate legal documents
        run: npm run check

  deploy:
    name: Trigger Vercel rebuild
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Trigger deploy hook
        run: |
          curl --fail-with-body --silent --show-error --request POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
