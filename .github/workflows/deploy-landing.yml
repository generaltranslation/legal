name: Notify Legal Consumers

on:
  workflow_run:
    workflows: ["Validate legal documents"]
    types: [completed]
    branches: [main]

permissions: {}

concurrency:
  group: notify-legal-consumers
  cancel-in-progress: true

jobs:
  notify:
    name: Notify ${{ matrix.repository }}
    if: >-
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repository:
          - generaltranslation/company
          - generaltranslation/gt-cloud
    steps:
      - name: Dispatch validated legal update
        env:
          GH_TOKEN: ${{ secrets.LEGAL_CONSUMER_TOKEN }}
          LEGAL_SHA: ${{ github.event.workflow_run.head_sha }}
          CONSUMER_REPOSITORY: ${{ matrix.repository }}
        run: |
          test -n "$GH_TOKEN"
          gh api --method POST \
            "repos/${CONSUMER_REPOSITORY}/dispatches" \
            --raw-field event_type=legal-updated \
            --raw-field "client_payload[sha]=${LEGAL_SHA}" \
            --raw-field "client_payload[source_repository]=${GITHUB_REPOSITORY}"
